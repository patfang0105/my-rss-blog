name: AI Direct Scout

on:
  schedule:
    - cron: '0 00 * * *'   # 北京时间早上 8:00
    - cron: '0 16 * * *'   # 北京时间晚上 00:00
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4
      - name: Run AI direct scout
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python ai_direct_scout.py
      - name: Commit updates
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add recommendations.json custom_feed.xml
          git commit -m "AI 自动更新 - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
